<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Land Admin Portal</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* LOGIN PAGE */

#loginPage{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.login-box{

background:white;
padding:40px;
width:320px;
border-radius:8px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);

}

.login-box h2{
text-align:center;
}

input{

width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:4px;

}

button{

width:100%;
padding:10px;
margin-top:15px;
background:#2c7be5;
color:white;
border:none;
border-radius:4px;
cursor:pointer;

}

/* DASHBOARD */

#dashboard{

display:none;

}

.header{

background:#1f2937;
color:white;
padding:15px;
display:flex;
justify-content:space-between;

}

.container{

display:flex;

}

.sidebar{

width:220px;
background:#111827;
color:white;
height:calc(100vh - 50px);
padding:20px;

}

.sidebar a{

display:block;
color:white;
padding:10px 0;
text-decoration:none;

}

.main{

flex:1;
padding:30px;

}

.card{

background:white;
padding:20px;
border-radius:6px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);

}

.status{

font-weight:bold;
padding:5px 10px;
border-radius:4px;

}

.available{

background:#28a745;
color:white;

}

.booked{

background:#dc3545;
color:white;

}

.action-btn{

width:auto;
margin-top:10px;
padding:10px 15px;

}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="login-box">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="header">

<div>Land Admin Portal</div>

<div><button onclick="logout()">Logout</button></div>

</div>

<div class="container">

<div class="sidebar">

<a href="#">Dashboard</a>
<a href="#">Book Parcel</a>
<a href="#">Parcel List</a>
<a href="#">Reports</a>
<a href="#">Settings</a>

</div>

<div class="main">

<div class="card">

<h3>Parcel Management</h3>

<label>Search Parcel by Unique_ID</label>

<input id="parcelID">

<button onclick="searchParcel()">Search</button>

<hr>

<div id="parcelInfo">

Parcel details will appear here.

</div>

</div>

</div>

</div>

</div>

<script>

let parcels={
"A1":{size:"2 Acres",status:"Available"},
"A2":{size:"1.5 Acres",status:"Booked"},
"A3":{size:"3 Acres",status:"Available"}
};

/* LOGIN */

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="admin" && p==="1234"){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

}else{

alert("Invalid login");

}

}

function logout(){

location.reload();

}

/* PARCEL SEARCH */

function searchParcel(){

let id=document.getElementById("parcelID").value;

let parcel=parcels[id];

if(!parcel){

document.getElementById("parcelInfo").innerHTML="Parcel not found";
return;

}

let statusClass=parcel.status==="Booked"?"booked":"available";

document.getElementById("parcelInfo").innerHTML=`

<p><b>Parcel ID:</b> ${id}</p>

<p><b>Size:</b> ${parcel.size}</p>

<p>Status:
<span class="status ${statusClass}">
${parcel.status}
</span>
</p>

<button class="action-btn" onclick="bookParcel('${id}')">Book</button>

<button class="action-btn" onclick="unbookParcel('${id}')">Unbook</button>

`;

}

/* BOOK PARCEL */

function bookParcel(id){

parcels[id].status="Booked";

searchParcel();

}

/* UNBOOK PARCEL */

function unbookParcel(id){

parcels[id].status="Available";

searchParcel();

}

</script>

</body>
</html>
