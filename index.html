<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Naivasha SEZ Plots - Mai Mahiu</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
    #sezSelect {
      position:absolute;
      top:10px;
      left:10px;
      z-index:1000;
      padding:5px;
    }
    #legend {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 1000;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin: 5px 0;
    }
    .legend-color {
      width: 20px;
      height: 20px;
      margin-right: 5px;
      border: 1px solid #999;
    }
  </style>
</head>

<body>

<select id="sezSelect">
  <option value="">Select SEZ</option>
</select>

<div id="legend">
  <h4>Plot Status</h4>
  <div class="legend-item">
    <div class="legend-color" style="background: #dc3545;"></div>
    <span>Allocated</span>
  </div>
  <div class="legend-item">
    <div class="legend-color" style="background: #ffc107;"></div>
    <span>Reserved</span>
  </div>
  <div class="legend-item">
    <div class="legend-color" style="background: #28a745;"></div>
    <span>Available</span>
  </div>
  <div class="legend-item">
    <div class="legend-color" style="background: #6c757d;"></div>
    <span>Other Status</span>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([-0.0236, 36.9062], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  L.marker([-0.0236, 36.9062])
    .addTo(map)
    .bindPopup("<b>Mai Mahiu</b><br>Near Naivasha, Kenya");

  // Function to determine color based on Status property
  function getStatusColor(status) {
    if (!status) return '#6c757d'; // Default gray for no status
    
    status = status.toLowerCase().trim();
    
    switch(status) {
      case 'allocated':
        return '#dc3545'; // Red
      case 'reserved':
        return '#ffc107'; // Yellow
      case 'available':
        return '#28a745'; // Green
      default:
        return '#6c757d'; // Gray for other statuses
    }
  }

  function sezStyle(feature) {
    var status = feature.properties.Status;
    var color = getStatusColor(status);
    
    return {
      color: '#333', // Border color
      weight: 1,
      fillColor: color,
      fillOpacity: 0.7,
      opacity: 1
    };
  }

  function onEachFeature(feature, layer) {
    var p = feature.properties;
    
    // Add hover effect
    layer.on({
      mouseover: function(e) {
        var layer = e.target;
        layer.setStyle({
          weight: 3,
          fillOpacity: 0.9
        });
        layer.bindTooltip(
          `<b>Parcel No: ${p.Parcel_No || "N/A"}</b><br>
           Status: ${p.Status || "N/A"}`
        ).openTooltip();
      },
      mouseout: function(e) {
        var layer = e.target;
        sezLayer.resetStyle(layer);
      },
      click: function(e) {
        var layer = e.target;
        layer.bindPopup(
          `<b>Parcel No: ${p.Parcel_No || "N/A"}</b><br>
           Size: ${p.Size || "N/A"} acres<br>
           Status: <strong style="color: ${getStatusColor(p.Status)}">${p.Status || "N/A"}</strong><br>
           Investor: ${p.Investor || "Not Assigned"}`
        ).openPopup();
      }
    });
  }

  var sezLayer; // Make global so dropdown can access it

  fetch(encodeURIComponent('NaivashaSEZPlots.geojson'))
    .then(response => response.json())
    .then(data => {

      sezLayer = L.geoJSON(data, {
        style: sezStyle,
        onEachFeature: onEachFeature
      }).addTo(map);

      map.fitBounds(sezLayer.getBounds());

      // Populate dropdown AFTER data loads
      var select = document.getElementById("sezSelect");

      sezLayer.eachLayer(function(layer, i) {
        var option = document.createElement("option");
        option.value = i;
        option.text = layer.feature.properties.Name || "Unnamed SEZ";
        select.appendChild(option);
      });

      // Zoom to selected SEZ
      select.addEventListener("change", function() {
        var idx = this.value;
        if (idx !== "") {
          var layers = sezLayer.getLayers();
          var chosenLayer = layers[idx];
          map.fitBounds(chosenLayer.getBounds());
          chosenLayer.openPopup();
        }
      });

    })
    .catch(error => console.error("Error loading GeoJSON:", error));

</script>

</body>
</html>
